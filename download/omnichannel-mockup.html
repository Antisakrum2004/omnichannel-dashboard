// Group channels by source
function groupChannels(channels) {
  const groups = {};
  const order = ['bitrix1', 'bitrix2', 'bitrix3', 'telegram', 'max', 'whatsapp'];
  order.forEach(src => {
    const items = channels.filter(c => c.source === src);
    if (items.length > 0) {
      groups[src] = items;
    }
  });
  return groups;
}

// ─── Components ───

function SourceBadge({ source, size = 'sm' }) {
  const s = SOURCES[source];
  if (!s) return null;
  return (
    <span className="source-badge" style={{ background: s.bg, color: s.color, border: `1px solid ${s.color}33` }}>
      {s.label}
    </span>
  );
}

function ChatListItem({ channel, isActive, onClick }) {
  const src = SOURCES[channel.source];
  return (
    <div className={`chat-item flex items-center gap-3 px-3 py-2.5 ${isActive ? 'active' : ''}`} onClick={onClick}>
      <div className="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold" style={{ background: src.bg, color: src.color }}>
        {channel.name.charAt(0)}
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5">
          <SourceBadge source={channel.source} />
          <span className="text-sm font-medium truncate">{channel.name}</span>
        </div>
        <div className="text-xs text-slate-400 truncate mt-0.5">{channel.last_msg}</div>
      </div>
      <div className="flex flex-col items-end gap-1 flex-shrink-0">
        <span className="text-[10px] text-slate-500">{channel.last_time}</span>
        {channel.unread > 0 && <div className="unread-badge">{channel.unread}</div>}
      </div>
    </div>
  );
}

function LeftPanel({ channels, activeId, onSelect, searchQuery, onSearch }) {
  const groups = groupChannels(channels);
  return (
    <div className="w-[260px] flex-shrink-0 h-full flex flex-col border-r border-slate-800" style={{ background: '#0d1117' }}>
      <div className="px-3 pt-4 pb-2">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-base font-bold text-white">Все чаты</h2>
          <button className="w-7 h-7 rounded-lg bg-slate-800 text-slate-400 flex items-center justify-center hover:bg-slate-700 hover:text-white transition-colors text-lg" title="Добавить чат">+</button>
        </div>
        <input
          className="search-input"
          placeholder="Поиск чатов..."
          value={searchQuery}
          onChange={e => onSearch(e.target.value)}
        />
      </div>
      <div className="flex-1 overflow-y-auto">
        {Object.entries(groups).map(([source, items]) => {
          const src = SOURCES[source];
          const totalUnread = items.reduce((s, c) => s + c.unread, 0);
          return (
            <div key={source}>
              <div className="group-header flex items-center gap-2">
                <span className="w-2 h-2 rounded-full" style={{ background: src.color }}></span>
                <span>{src.name}</span>
                <span className="text-slate-600 ml-auto">{items.length}</span>
                {totalUnread > 0 && <div className="unread-badge text-[10px]" style={{ minWidth: 16, height: 16, fontSize: 10 }}>{totalUnread}</div>}
              </div>
              {items.map(ch => (
                <ChatListItem
                  key={ch.id}
                  channel={ch}
                  isActive={ch.id === activeId}
                  onClick={() => onSelect(ch.id)}
                />
              ))}
            </div>
          );
        })}
      </div>
      <div className="px-3 py-3 border-t border-slate-800 text-center">
        <div className="text-[11px] text-slate-600">11 чатов · 11 непрочитанных</div>
      </div>
    </div>
  );
}

function MessageBubble({ msg }) {
  const isOut = msg.sender_type === 'operator';
  return (
    <div className={`flex ${isOut ? 'justify-end' : 'justify-start'} mb-3`}>
      <div className={`max-w-[75%] ${isOut ? 'msg-bubble-out' : 'msg-bubble-in'} px-4 py-2.5`}>
        <div className={`text-xs font-medium mb-1 ${isOut ? 'text-blue-200' : 'text-slate-400'}`}>
          {msg.sender}
        </div>
        <div className="text-sm leading-relaxed">{msg.text}</div>
        <div className={`text-[10px] mt-1 ${isOut ? 'text-blue-300' : 'text-slate-500'}`}>
          {msg.time}
        </div>
      </div>
    </div>
  );
}

function CenterPanel({ channel, messages, inputText, onInputChange, onSend }) {
  const src = channel ? SOURCES[channel.source] : null;
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [channel?.id]);

  if (!channel) {
    return (
      <div className="flex-1 flex items-center justify-center" style={{ background: '#0f1117' }}>
        <div className="text-center text-slate-500">
          <div className="text-5xl mb-4">💬</div>
          <div className="text-lg font-medium">Выберите чат</div>
          <div className="text-sm mt-1">Чтобы начать, выберите чат в левой колонке</div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col h-full" style={{ background: '#0f1117' }}>
      {/* Top bar */}
      <div className="flex items-center gap-3 px-5 py-3 border-b border-slate-800" style={{ background: '#0d1117' }}>
        <div className="w-9 h-9 rounded-lg flex items-center justify-center text-sm font-bold" style={{ background: src.bg, color: src.color }}>
          {channel.name.charAt(0)}
        </div>
        <div>
          <div className="flex items-center gap-2">
            <span className="text-sm font-semibold">{channel.name}</span>
            <SourceBadge source={channel.source} />
          </div>
          <div className="text-[11px] text-slate-500">{src.name} · {channel.external_id}</div>
        </div>
        <div className="ml-auto flex items-center gap-2">
          <div className="typing-dots text-slate-500 text-xs" style={{ display: 'none' }}>
            печатает<span>.</span><span>.</span><span>.</span>
          </div>
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-5 py-4">
        {(messages || []).map(msg => (
          <MessageBubble key={msg.id} msg={msg} />
        ))}
        <div ref={messagesEndRef} />
      </div>

      {/* Input */}
      <div className="px-5 py-3 border-t border-slate-800" style={{ background: '#0d1117' }}>
        <div className="input-area flex items-center gap-2 px-4 py-2">
          <input
            className="flex-1 bg-transparent outline-none text-sm text-slate-200 placeholder-slate-500"
            placeholder="Написать сообщение..."
            value={inputText}
            onChange={e => onInputChange(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); } }}
          />
          <button className="send-btn text-sm" onClick={onSend}>Отправить</button>
        </div>
      </div>
    </div>
  );
}

  const src = SOURCES[channel.source];
  const events = CONTACT_EVENTS[channel.id] || [];
  const initials = channel.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

  return (
    <div className="w-[270px] flex-shrink-0 h-full border-l border-slate-800 flex flex-col" style={{ background: '#0d1117' }}>
      {/* Contact card */}
      <div className="px-5 py-6 text-center border-b border-slate-800">
        <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-xl font-bold mb-3" style={{ background: src.bg, color: src.color }}>
          {initials}
        </div>
        <div className="text-sm font-semibold">{channel.name}</div>
        <div className="flex items-center justify-center gap-1.5 mt-1.5">
          <SourceBadge source={channel.source} />
          <span className="text-xs text-slate-500">{src.name}</span>
        </div>
        <div className="text-xs text-slate-500 mt-1">{channel.external_id}</div>
      </div>

      {/* Recent events */}
      <div className="px-5 py-4 flex-1">
        <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Последние события</div>
        {events.map((ev, i) => (
          <div key={i} className="contact-event flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: src.color }}></span>
            {ev}
          </div>
        ))}
      </div>

      {/* Actions */}
      <div className="px-5 py-4 border-t border-slate-800">
        {channel.source.startsWith('bitrix') && (
          <button className="w-full py-2.5 rounded-lg text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition-colors">
            Открыть в Битрикс24
          </button>
        )}
        {channel.source === 'telegram' && (
          <button className="w-full py-2.5 rounded-lg text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition-colors">
            Открыть в Telegram
          </button>
        )}
        {channel.source === 'max' && (
          <button className="w-full py-2.5 rounded-lg text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition-colors">
            Открыть в MAX
          </button>
        )}
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [activeChatId, setActiveChatId] = useState('c9');
  const [inputText, setInputText] = useState('');
  const [searchQuery, setSearchQuery] = useState('');

  const activeChannel = CHANNELS.find(c => c.id === activeChatId);
  const activeMessages = MESSAGES[activeChatId] || [];

  const filteredChannels = searchQuery
    ? CHANNELS.filter(c =>
        c.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        c.last_msg.toLowerCase().includes(searchQuery.toLowerCase())
      )
    : CHANNELS;

  const handleSend = () => {
    if (!inputText.trim()) return;
    // In a real app this would go to the backend
    alert('Отправка: "' + inputText + '"\n\n(в реальном приложении — POST /api/send → Gateway → Telegram/Bitrix/MAX API)');
    setInputText('');
  };

  return (
    <div className="flex h-screen">
      <LeftPanel
        channels={filteredChannels}
        activeId={activeChatId}
        onSelect={setActiveChatId}
        searchQuery={searchQuery}
        onSearch={setSearchQuery}
      />
      <CenterPanel
        channel={activeChannel}
        messages={activeMessages}
        inputText={inputText}
        onInputChange={setInputText}
        onSend={handleSend}
      />
      <RightPanel channel={activeChannel} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
