
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--color-background-tertiary); }
.app { max-width: 400px; margin: 0 auto; background: var(--color-background-primary); border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.tab-bar { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: background 0.2s, color 0.2s; }
.tab.active { background: var(--color-background-info); color: var(--color-text-info); }
.tab .badge { background: var(--color-text-info); color: var(--color-background-primary); border-radius: 10px; padding: 1px 6px; font-size: 11px; }
.tab.active .badge { background: var(--color-text-info); opacity: 0.8; }
.chat-container { position: relative; overflow: hidden; height: 480px; }
.chat-list {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; scrollbar-width: thin;
  opacity: 0; pointer-events: none;
  transform: translateX(30px);
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.chat-list.active {
  opacity: 1; pointer-events: auto;
  transform: translateX(0);
}
.chat-list.exit-left { transform: translateX(-30px); opacity: 0; }
.chat-list.exit-right { transform: translateX(30px); opacity: 0; }
.chat-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer; border-bottom: 0.5px solid var(--color-border-tertiary);
  transition: background 0.15s;
}
.chat-item:hover { background: var(--color-background-secondary); }
.chat-item.selected { background: var(--color-background-info); }
.avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500; font-size: 16px; flex-shrink: 0;
}
.chat-info { flex: 1; overflow: hidden; }
.chat-row { display: flex; justify-content: space-between; align-items: baseline; }
.chat-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-time { font-size: 11px; color: var(--color-text-tertiary); flex-shrink: 0; margin-left: 6px; }
.chat-preview { font-size: 12px; color: var(--color-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.unread { background: #4CAF50; color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 500; }
.chat-sub { display: flex; justify-content: space-between; align-items: center; }
</style>

<div class="app">
  <div class="tab-bar" id="tabBar"></div>
  <div class="chat-container" id="chatContainer"></div>
</div>

<script>
const COLORS = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517','#E24B4A','#534AB7','#0F6E56'];
const COLORS_BG = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA','#FCEBEB','#26215C','#04342C'];

const tabs = [
  { id: 'all', label: 'All' },
  { id: '1', label: 'Tab 1' },
  { id: '2', label: 'Tab 2' },
  { id: '3', label: 'Tab 3' },
];

const chats = [
  { id: 1, name: 'Алексей К.', preview: 'Привет, как дела?', time: '01:20', tabs: ['all','1'], unread: 3, color: 0 },
  { id: 2, name: 'Команда проекта', preview: 'Тимур: правки внёс', time: 'Apr 22', tabs: ['all','1','2'], unread: 0, color: 1 },
  { id: 3, name: 'Мария Н.', preview: 'Спасибо большое!', time: 'Wed', tabs: ['all','1'], unread: 0, color: 2 },
  { id: 4, name: 'Рабочий чат', preview: 'Когда встреча?', time: 'Wed', tabs: ['all','2'], unread: 7, color: 3 },
  { id: 5, name: 'Новости', preview: 'Важное обновление', time: '01:26', tabs: ['all','2','3'], unread: 1, color: 4, selected: true },
  { id: 6, name: 'Сергей В.', preview: 'Ок, договорились', time: 'Tue', tabs: ['all','1'], unread: 0, color: 5 },
  { id: 7, name: 'Aнализ данных', preview: 'Отчёт готов', time: 'Wed', tabs: ['all','3'], unread: 0, color: 6 },
  { id: 8, name: 'Дарья П.', preview: 'Хорошо, увидимся', time: 'Mon', tabs: ['all','3'], unread: 2, color: 7 },
  { id: 9, name: 'Дизайн', preview: 'Макет обновили', time: 'Wed', tabs: ['all','2'], unread: 0, color: 8 },
  { id: 10, name: 'Наташа О.', preview: 'До завтра!', time: 'Sun', tabs: ['all','1','3'], unread: 0, color: 9 },
];

let activeTabId = 'all';
let tabOrder = tabs.map(t => t.id);
let lists = {};

function getUnreadCount(tabId) {
  return chats.filter(c => c.tabs.includes(tabId) && c.unread > 0).reduce((s,c) => s + c.unread, 0);
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const unread = tab.id !== 'all' ? getUnreadCount(tab.id) : chats.reduce((s,c)=>s+c.unread,0);
    const btn = document.createElement('button');
    btn.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    btn.innerHTML = tab.label + (unread > 0 ? `<span class="badge">${unread}</span>` : '');
    btn.onclick = () => switchTab(tab.id);
    bar.appendChild(btn);
  });
}

function renderChatList(tabId) {
  const filtered = chats.filter(c => c.tabs.includes(tabId));
  const div = document.createElement('div');
  div.className = 'chat-list';
  div.dataset.tab = tabId;

  filtered.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.selected && tabId === activeTabId ? ' selected' : '');
    item.innerHTML = `
      <div class="avatar" style="background:${COLORS_BG[chat.color]};color:${COLORS[chat.color]}">
        ${chat.name[0]}
      </div>
      <div class="chat-info">
        <div class="chat-row">
          <span class="chat-name">${chat.name}</span>
          <span class="chat-time">${chat.time}</span>
        </div>
        <div class="chat-sub">
          <span class="chat-preview">${chat.preview}</span>
          ${chat.unread > 0 ? `<span class="unread">${chat.unread}</span>` : ''}
        </div>
      </div>`;
    div.appendChild(item);
  });

  return div;
}

function switchTab(newTabId) {
  if (newTabId === activeTabId) return;

  const oldIdx = tabOrder.indexOf(activeTabId);
  const newIdx = tabOrder.indexOf(newTabId);
  const direction = newIdx > oldIdx ? 1 : -1;

  const container = document.getElementById('chatContainer');
  const oldList = lists[activeTabId];
  const newList = lists[newTabId] || renderChatList(newTabId);
  lists[newTabId] = newList;

  if (!newList.parentNode) container.appendChild(newList);

  newList.style.transition = 'none';
  newList.style.opacity = '0';
  newList.style.transform = `translateX(${direction * 40}px)`;
  newList.classList.remove('active');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newList.style.transition = '';
      newList.classList.add('active');

      if (oldList) {
        oldList.classList.remove('active');
        oldList.style.transform = `translateX(${-direction * 40}px)`;
        oldList.style.opacity = '0';
        setTimeout(() => { if (oldList.parentNode) oldList.parentNode.removeChild(oldList); }, 250);
        delete lists[activeTabId];
      }

      activeTabId = newTabId;
      renderTabs();
    });
  });
}

function init() {
  const container = document.getElementById('chatContainer');
  const list = renderChatList('all');
  list.classList.add('active');
  container.appendChild(list);
  lists['all'] = list;
  renderTabs();
}

init();
</script>
